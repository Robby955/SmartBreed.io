<!-- scoreboard.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/score.css') }}">
</head>
</head>
<body>
    <h1>Scoreboard</h1>
    <div>
        <!-- Add content for scoreboard here -->
        <ul>
            {% for player in top_players %}
                <li>{{ player.name }} - Score: {{ player.score }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
